ManagerConfig:
  DefaultRuleInput:
    Filters:
      WorkflowStatus:
      - Value: NEW
        Comparison: EQUALS
      - Value: NOTIFIED
        Comparison: EQUALS
    UpdatesToFilteredFindings:
      Workflow:
        Status: SUPPRESSED
      Note:
        UpdatedBy: sechubman
    ExtraFeatures:
      RegexStringFilters:
        ProductArn:
        - .*config$
Rules:
- Filters:
    ResourceId:
    - Value: arn:aws:s3:::test-sechubman
      Comparison: EQUALS
  ExtraFeatures:
    QuickNote: Test
